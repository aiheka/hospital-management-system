<!DOCTYPE html>
<html>
<head>
    <title>Edit Patient</title>
</head>
<body>

<h1>Edit Patient</h1>

<form method="POST">

    <label>Name:</label>
    <input
        type="text"
        name="name"
        value="{{ patient.name }}"
        required
    >

    <br><br>

    <label>Age:</label>
    <input
        type="number"
        name="age"
        value="{{ patient.age }}"
        required
    >

    <br><br>

    <label>Disease:</label>
    <input
        type="text"
        name="disease"
        value="{{ patient.disease }}"
        required
    >

    <br><br>

    <button type="submit">
        Update Patient
    </button>

</form>

</body>
</html>
