<!DOCTYPE html>
<html>
<head>
    <title>Patients</title>
</head>
<body>

<h1>Patient List</h1>

{% for patient in patients %}

    <hr>

    <p>Name: {{ patient.name }}</p>
    <p>Age: {{ patient.age }}</p>
    <p>Disease: {{ patient.disease }}</p>

    <a href="/edit/{{ patient.id }}">
        Edit
    </a>

    |

    <a href="/delete/{{ patient.id }}">
        Delete
    </a>

{% endfor %}

<br><br>

<a href="/add_patient">
    Add Patient
</a>

</body>
</html>
